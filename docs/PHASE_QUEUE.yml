# Phase 작업 큐 - 매일 KST 09:15 자율 개발 루프가 참조
# 우선순위: ★★★ (즉시) > ★★ (다음) > ★ (시간 여유)
# 상태: pending / in_progress / completed / blocked

phases:
  - phase: 2
    items:
      - id: WE_RULES
        title: Western Electric 8 Rules 자동 판정
        priority: 3
        status: completed
        completed_at: 2026-06-16
        depends_on: [DATA_30_PER_STATION]
        deliverables:
          - src/analysis/western_electric.py    # Rule 1~8 (테스트 32건)
          - tests/test_western_electric.py
          - dashboard/pages/5_📈_관리도.py        # 룰별 위반 테이블

      - id: CONTROL_CHART
        title: EWMA/CUSUM/X-bar 관리도 데이터 생성
        priority: 3
        status: completed
        completed_at: 2026-05-29
        depends_on: []
        deliverables:
          - src/analysis/control_chart.py        # I-Chart/EWMA/CUSUM (MR 기반 σ)
          - tests/test_control_chart.py           # 19건 통과
          - dashboard/pages/5_📈_관리도.py        # 측정소·지표·차트종류 선택 + 이탈 강조

      - id: RESIDUAL_CHART
        title: 자기상관 보정 잔차 관리도 (Residual/ARIMA-style SPC)
        priority: 3
        status: completed
        completed_at: 2026-05-29
        depends_on: [CONTROL_CHART]
        deliverables:
          - src/analysis/residual_chart.py        # 일주기 제거 + AR(1) 잔차 I-Chart
          - tests/test_residual_chart.py           # 10건 통과
          - dashboard/pages/5_📈_관리도.py        # 거짓경보율 Before/After 섹션
        note: 실데이터 PM2.5 이탈률 48~50%→1.6~2.1% (ACF 0.93→≈0)

      - id: HYPOTHESIS_TEST
        title: t-test/ANOVA 단지 비교 통계 검정
        priority: 3
        status: completed
        completed_at: 2026-05-29
        depends_on: [DATA_30_PER_STATION]
        deliverables:
          - src/analysis/hypothesis_test.py        # Welch t-test/ANOVA + Cohen's d/η²
          - tests/test_hypothesis_test.py          # 12건 통과
          - scripts/generate_hypothesis_report.py  # MD+Word, 30+ 게이트 자동화
          - reports/hypothesis/YYYY-MM-DD.md/.docx  # daily 루프 자동 생성

      - id: ISOLATION_FOREST
        title: IsolationForest 다변량 이상 탐지
        priority: 2
        status: completed
        completed_at: 2026-06-16
        depends_on: [DATA_50_PER_STATION]
        deliverables:
          - src/analysis/anomaly.py    # sklearn IsolationForest, detect_anomalies(_by_station)
          - tests/test_anomaly.py

  - phase: 3
    items:
      - id: SELF_HEAL_BACKFILL
        title: Self-healing 수집 백필 (GHA cron 드롭 자동 복구)
        priority: 3
        status: completed
        completed_at: 2026-05-29
        depends_on: []
        deliverables:
          - src/collectors/self_heal.py            # 갭 탐지 + DAILY/MONTH 자동 복구
          - tests/test_self_heal.py                # 7건 통과
          - scripts/collect_once.py                # 매 수집 실행에 self-heal 연결
          - src/storage/database.py                # query_pairs_since 헬퍼

      - id: DISCORD_ALERT
        title: Discord Webhook 알림 (Cpk 임계 미달/룰 위반)
        priority: 2
        status: completed
        completed_at: 2026-06-16
        depends_on: [WE_RULES]
        deliverables:
          - src/notifier/discord.py        # DiscordAlert + send_alert (테스트 14건)
          - flows/alert_flow.py            # Cpk·WE Rules 점검 → 전송
          - .github/workflows/collect.yml  # 수집 후 알림 단계

      - id: DMAIC_REPORT
        title: DMAIC 분석 보고서 자동 생성 (PDF)
        priority: 3
        status: completed
        completed_at: 2026-05-29
        depends_on: [HYPOTHESIS_TEST]
        deliverables:
          - scripts/generate_dmaic_report.py       # fpdf2(한글 TTF 임베드), 로컬 실행
          - reports/dmaic/YYYY-MM-DD.pdf            # D-M-A-I-C 3페이지
        note: |
          fpdf2 채택(reportlab/weasyprint 대신, 순수 파이썬 → 3.14 안전).
          Improve에 P0 성과(PM2.5 거짓경보 48%→2%)·Cpk 우선관리, Control에 기상은 향후과제로 명시.
          한글 폰트(malgun 등) 필요해 CI 미연동, 로컬/온디맨드 생성.

  - phase: 4
    items:
      - id: WEATHER_API
        title: 기상청 API 결합 + 풍향 회귀 분석
        priority: 1
        status: in_progress   # 파이프라인 구축 완료, 데이터 누적 대기
        started_at: 2026-06-24
        depends_on: [DATA_1000]
        deliverables:
          - src/collectors/weather.py        # ASOS 시간자료 클라이언트(테스트 12건)
          - src/storage/models.py            # WeatherObservation 테이블
          - scripts/collect_weather.py       # 매시 수집(collect.yml에 통합)
          - src/analysis/wind_regression.py  # 오염장미·산단방위검정·기상회귀(테스트 11건)
          - tests/test_weather.py, tests/test_wind_regression.py
        note: |
          코드·수집 파이프라인은 완성. 실분석 산출(풍향 회귀 차트·검정)은
          (1) WEATHER_API_KEY(공공데이터포털 ASOS) 등록 + (2) 기상 데이터 누적이 선행조건.
          분산분해(PM2.5 시간·기상 97.6%)의 '기상' 내역을 실증하는 것이 목표.

# 데이터 충분도 마일스톤
# ※ 2026-05-29 기준 3MONTH 백필로 총 ~10,745건(측정소당 ~2,150건) 확보 → 아래 4개 모두 달성됨.
#    남은 제약은 '양'이 아니라 '계절 다양성'(현재 봄 한 철). WEATHER_API의 실질 선행조건은
#    DATA_1000(달성)이 아니라 다계절 데이터(여름~)이며 이는 자연 누적 대기.
data_milestones:
  DATA_30_PER_STATION:
    description: 측정소당 30건 이상 누적 (Cp/Cpk 최소 표본)
    status: met  # 2026-05-29
  DATA_50_PER_STATION:
    description: 측정소당 50건 이상
    status: met  # 2026-05-29
  DATA_500:
    description: 총 500건 이상
    status: met  # 2026-05-29
  DATA_1000:
    description: 총 1000건 이상
    status: met  # 2026-05-29

# 매일 자율 루프에서 자동으로 수행하는 작업 (daily_dev_loop.py)
daily_auto_tasks:
  - run_pytest: 전체 회귀 테스트 (현재 174건)
  - report_accumulation: 누적 데이터 통계
  - report_24h_health: 최근 24시간 수집 성공률 (기대치 = 24h × 측정소수 동적)
  - report_cpk_matrix: 측정소·지표 조합 Cpk 산출
  - report_milestone_progress: 데이터 마일스톤 진행률
  - report_next_phase_items: 큐에서 다음 후보 작업 안내
  - generate_hypothesis_report: 표본 30+ 시 t-test/ANOVA 리포트(MD+Word) 자동 생성
