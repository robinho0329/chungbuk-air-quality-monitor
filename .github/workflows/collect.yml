name: 🌬️ 충북 대기질 자동 수집

# 컴퓨터 꺼져있어도 GitHub 서버에서 매시 자동 실행.
# 결과 SQLite DB는 레포에 자동 커밋되어 영속 저장.

on:
  # 트리거는 외부 스케줄러(cron-job.org → workflow_dispatch) 단일화.
  # GitHub 내장 schedule은 best-effort라 드롭이 잦고 정시 외부 cron과 동시 push 충돌로
  # 실패 알림 메일을 양산해 제거했다. 외부 cron이 최대 3일 죽어도 self-heal(72h 윈도)이
  # 다음 성공 실행에서 갭을 자동 복구하므로 데이터 완결성은 유지된다.
  # docs/EXTERNAL_SCHEDULER_SETUP.md 참조.
  workflow_dispatch:  # [Primary] 외부 cron(cron-job.org) 매시 호출 + UI 수동 실행

permissions:
  contents: write  # 결과 DB 커밋 & push 권한

# 동시 실행 방지: 이전 run이 끝나기 전에 새 cron이 떠도 큐에 안 쌓이게.
concurrency:
  group: airkorea-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 레포 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: 🚀 uv 설치
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: 🐍 Python 3.14 설치 (uv)
        run: uv python install 3.14

      - name: 📦 의존성 설치
        run: uv sync --frozen

      - name: 🌬️ 에어코리아 1회 수집 실행
        env:
          AIRKOREA_API_KEY: ${{ secrets.AIRKOREA_API_KEY }}
          AIRKOREA_API_KEY_ENCODED: ${{ secrets.AIRKOREA_API_KEY }}
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: uv run python scripts/collect_once.py

      - name: 📊 누적 카운트 출력
        run: |
          uv run python -c "
          from collections import Counter
          from src.storage.database import query_all
          rows = query_all()
          print(f'총 {len(rows)}건 누적')
          for k, v in Counter(r.station_name for r in rows).items():
              print(f'  {k}: {v}건')
          " || true

      - name: 📤 DB 변경 시 커밋 & 푸시 (충돌 시 멱등 재수집 재시도)
        env:
          AIRKOREA_API_KEY: ${{ secrets.AIRKOREA_API_KEY }}
          AIRKOREA_API_KEY_ENCODED: ${{ secrets.AIRKOREA_API_KEY }}
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          git config user.email "airkorea-bot@github-actions"
          git config user.name "Airkorea Collect Bot"

          # 바이너리 data.db는 rebase 자동 병합이 불가능하다. 동시 push로 거부되면
          # 원격 최신으로 리셋 후 collect_once를 재실행(INSERT OR IGNORE = 멱등)해
          # 이번 시각 데이터를 최신 DB에 다시 삽입하고 재커밋·재푸시한다.
          for attempt in 1 2 3 4 5; do
            git add src/storage/data.db
            if git diff --staged --quiet; then
              echo "DB 변경 없음 — 커밋 스킵 (이미 반영됨/중복 INSERT OR IGNORE)"
              exit 0
            fi
            TS=$(date -u +'%Y-%m-%dT%H:%MZ')
            COUNT=$(uv run python -c "from src.storage.database import query_all; print(len(query_all()))" 2>/dev/null || echo "?")
            git commit -m "auto(collect): airkorea snapshot ${TS} (누적 ${COUNT}건)"
            if git push origin main; then
              echo "✅ push 성공 (시도 ${attempt}/5)"
              exit 0
            fi
            echo "⚠️ push 거부(non-fast-forward) — 원격 반영 후 멱등 재수집 (${attempt}/5)"
            git fetch origin main
            git reset --hard origin/main          # 내 커밋·로컬 DB 폐기, 원격 최신 채택
            uv run python scripts/collect_once.py || true   # 최신 DB에 이번 시각 재삽입
            sleep $(( (RANDOM % 6) + 2 ))
          done
          echo "❌ 5회 재시도 후에도 push 실패"
          exit 1

      - name: 🔔 SPC 이상 탐지 알림 (Cpk 미달 / WE Rules 위반)
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          AIRKOREA_API_KEY: ${{ secrets.AIRKOREA_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: uv run python flows/alert_flow.py || true
        # || true: 알림 실패해도 수집 워크플로우 전체는 성공으로 처리
