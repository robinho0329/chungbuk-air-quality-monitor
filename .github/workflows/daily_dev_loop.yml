name: 🤖 데일리 자율 개발 루프

# EPL 프로젝트 daily_dev_loop 패턴 차용.
# 매일 KST 09:15 (UTC 00:15)에 GitHub Actions가 자동 실행:
#   - pytest 회귀 테스트
#   - 누적 데이터 통계 리포트
#   - 24h 수집 성공률
#   - Cp/Cpk 매트릭스
#   - 마일스톤 진행률
#   - 다음 후보 작업 (PHASE_QUEUE.yml)
# 결과는 reports/daily/YYYY-MM-DD.md + reports/daily/latest.md로 commit·push.

on:
  schedule:
    # [Fallback] GitHub 내장 schedule은 best-effort라 지연·드롭이 잦다(실측 4h+ 지연).
    # 신뢰성은 외부 스케줄러(cron-job.org → workflow_dispatch)에 맡기고, 이 schedule은
    # 외부가 죽었을 때의 2차 안전망. docs/EXTERNAL_SCHEDULER_SETUP.md 참조.
    - cron: '15 0 * * *'  # KST 09:15
  workflow_dispatch:  # [Primary] 외부 cron(cron-job.org)이 매일 1회 호출 + UI 수동

permissions:
  contents: write

concurrency:
  group: daily-dev-loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 레포 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: 🚀 uv 설치
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: 🐍 Python 3.14 설치 (uv)
        run: uv python install 3.14

      - name: 📦 의존성 설치
        run: uv sync --frozen

      - name: 🤖 데일리 루프 실행 (pytest + 통계 + 리포트)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          # 수집은 안 하지만 collectors 모듈이 import 될 가능성 대비
          AIRKOREA_API_KEY: ${{ secrets.AIRKOREA_API_KEY }}
        run: uv run python scripts/daily_dev_loop.py

      - name: 🧪 가설검정 리포트 (표본 30+ 시 자동 생성)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: uv run python scripts/generate_hypothesis_report.py

      - name: 📤 리포트 자동 commit & push (충돌 시 rebase 재시도)
        run: |
          git config user.email "daily-loop@github-actions"
          git config user.name "Daily Dev Loop Bot"
          git add reports/daily/ reports/hypothesis/
          if git diff --staged --quiet; then
            echo "리포트 변경 없음 — 커밋 스킵"
            exit 0
          fi
          TS=$(date -u +'%Y-%m-%d')
          git commit -m "auto(daily): dev loop report ${TS}"
          # 리포트는 data.db와 파일이 겹치지 않아 rebase로 깔끔히 재적용된다.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            if git push origin main; then
              echo "✅ push 성공 (시도 ${attempt}/5)"
              exit 0
            fi
            echo "⚠️ push 거부 — 재시도 (${attempt}/5)"
            sleep $(( (RANDOM % 6) + 2 ))
          done
          echo "❌ 5회 재시도 후에도 push 실패"
          exit 1
